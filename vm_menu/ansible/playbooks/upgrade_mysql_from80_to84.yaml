---
- name: Percona MySQL upgrade 8.0 to 8.4
  hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    mysql_socket: /run/mysqld/mysqld.sock
  pre_tasks:
    - name: Set facts for Astra Linux
      ansible.builtin.include_tasks: "tasks/set_facts_for_astra.yaml"
      tags: always

  tasks:
    - name: Ensure MySQL is running before upgrade
      ansible.builtin.systemd:
        name: mysql
        state: started

    - name: Check MySQL is responsive (not crashed)
      ansible.builtin.command: >
        mysqladmin --socket={{ mysql_socket }} ping
      register: mysql_ping
      changed_when: false
      failed_when: "'mysqld is alive' not in mysql_ping.stdout"

    - name: Set innodb_fast_shutdown=0 (slow shutdown required)
      ansible.builtin.command: >
        mysql --socket={{ mysql_socket }} -e
        "SET GLOBAL innodb_fast_shutdown=0;"
      changed_when: true

    - name: Verify innodb_fast_shutdown is 0
      ansible.builtin.command: >
        mysql --socket={{ mysql_socket }} -Nse
        "SELECT @@GLOBAL.innodb_fast_shutdown;"
      register: innodb_fast_shutdown_value
      changed_when: false
      failed_when: innodb_fast_shutdown_value.stdout != "0"

    - name: Stop mysql with slow shutdown
      ansible.builtin.systemd:
        name: mysql
        state: stopped

    - name: Delete old config
      ansible.builtin.file:
        path: /etc/mysql/mysql.conf.d/x_server.cnf
        state: absent

    - name: Enable Percona 8.4 repository on Astra Linux
      when:
        - ansible_facts_lsb_id is defined and ansible_facts_lsb_id == 'Astra'
      block:
        - name: Backup Astra /etc/os-release
          ansible.builtin.copy:
            src: /etc/os-release
            dest: /etc/os-release.astra
            remote_src: true
            mode: preserve

        - name: Write temporary Debian /etc/os-release
          ansible.builtin.copy:
            dest: /etc/os-release
            owner: root
            group: root
            mode: '0644'
            content: |
              PRETTY_NAME="Debian GNU/Linux 12 (bookworm)"
              NAME="Debian GNU/Linux"
              VERSION_ID="12"
              VERSION="12 (bookworm)"
              VERSION_CODENAME=bookworm
              ID=debian
              HOME_URL="https://www.debian.org/"
              SUPPORT_URL="https://www.debian.org/support"
              BUG_REPORT_URL="https://bugs.debian.org/"

        - name: Enable Percona 8.4 repository for Astra Linux
          ansible.builtin.command: percona-release setup ps-84-lts
          changed_when: false

      always:
        - name: Restore Astra /etc/os-release
          ansible.builtin.copy:
            src: /etc/os-release.astra
            dest: /etc/os-release
            remote_src: true
            mode: preserve

    - name: Enable Percona 8.4 repository
      ansible.builtin.command: percona-release setup ps-84-lts
      changed_when: false
      when:
        - ansible_facts_lsb_id is not defined or ansible_facts_lsb_id != 'Astra'

    - name: Install percona-server 8.4
      ansible.builtin.apt:
        name: percona-server-server
        state: latest
        update_cache: true

    - name: Start mysql after upgrade
      ansible.builtin.systemd:
        name: mysql
        state: started

    - name: Generate new config for mysql
      ansible.builtin.include_role:
        name: geerlingguy.mysql.reconfigure

    - name: Disable percona-telemetry-agent
      ansible.builtin.systemd:
        name: percona-telemetry-agent
        state: stopped
        enabled: false
