---
- name: Delete the site {{ site }}
  hosts: localhost
  connection: local
  become: true
  gather_facts: true
  tasks:
    - name: Deliting site dir {{ full_path_site }}
      ansible.builtin.file:
        name: "{{ full_path_site }}"
        state: absent

    - block:

        - name: Installing of python3-pymysql
          ansible.builtin.apt:
            name: python3-pymysql
            state: present

        - name: Deliting data base {{ db_name }}
          community.mysql.mysql_db:
            name: "{{ db_name }}"
            state: absent

        - name: Deliting database user {{ db_user }}
          community.mysql.mysql_user:
            name: "{{ db_user }}"
            state: absent

        - name: Deliting cron task
          ansible.builtin.cron:
            name: Adding cron bitrix agents site {{ site }}
            user: "{{ user_server_sites }}"
            state: absent

      when:
        - type == "full"
        - db_type | default('mysql') == "mysql"

    - block:

        - name: Installing of python3-psycopg2
          ansible.builtin.apt:
            name: python3-psycopg2
            state: present

        - name: Deliting PostgreSQL data base {{ db_name }}
          community.postgresql.postgresql_db:
            name: "{{ db_name }}"
            port: "{{ postgresql_port }}"
            login_user: postgres
            login_unix_socket: /run/postgresql
            state: absent
            force: true
          become: true
          become_user: postgres
          become_method: su

        - name: Deliting PostgreSQL database user {{ db_user }}
          community.postgresql.postgresql_user:
            name: "{{ db_user }}"
            port: "{{ postgresql_port }}"
            login_user: postgres
            login_unix_socket: /run/postgresql
            state: absent
          become: true
          become_user: postgres
          become_method: su

        - name: Remove PostgreSQL user from pgbouncer
          ansible.builtin.include_role:
            name: mshurutov.pgbouncer
          vars:
            pgbouncer_action: DELETE
            pgbouncer_pkg_state: present
            pgbouncer_db_state: absent
            pgbouncer_db_user: "{{ db_user }}"
            pgbouncer_db_password: ""
            pgbouncer_db_port: "{{ postgresql_port }}"
            pgbouncer_db_host: "/run/postgresql/"
            postgresql_db_encoding: UTF-8
          when: pgbouncer_use | default(false) | bool

        - name: Deliting cron task
          ansible.builtin.cron:
            name: Adding cron bitrix agents site {{ site }}
            user: "{{ user_server_sites }}"
            state: absent

      when:
        - type == "full"
        - db_type | default('mysql') == "pgsql"

    - name: Rename Nginx config {{ site }}.conf
      ansible.builtin.file:
        name: "{{ path_nginx_sites_conf }}/{{ site }}.conf"
        state: absent

    - name: Delete nginx config link {{ site }}.conf
      ansible.builtin.file:
        name: "{{ path_nginx_sites_enabled }}/{{ site }}.conf"
        state: absent

    - name: Rename Apache config {{ site }}.conf
      ansible.builtin.file:
        name: "{{ path_apache_sites_conf }}/{{ site }}.conf"
        state: absent

    - name: Delete tmpfiles config
      ansible.builtin.file:
        dest: "/etc/tmpfiles.d/{{ site }}.conf"
        state: absent

    - name: Delete tmpfiles dirs
      ansible.builtin.file:
        dest: "{{ php_dirs }}"
        state: absent
      loop:
        - "/tmp/php_sessions/{{ site }}"
        - "/tmp/php_upload/{{ site }}"
      loop_control:
        loop_var: php_dirs

    - name: Restarting Nginx
      ansible.builtin.systemd:
        name: "{{ service_nginx_name }}"
        state: reloaded

    - name: Restarting Apache
      ansible.builtin.systemd:
        name: "{{ service_apache_name }}"
        state: reloaded
