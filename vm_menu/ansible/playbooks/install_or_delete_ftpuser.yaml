---
- name: "Ftp-user {{ pureftp_action }}"
  hosts: localhost
  connection: local
  become: true
  gather_facts: true
  pre_tasks:
    - name: Set facts for Astra Linux
      ansible.builtin.include_tasks: "tasks/set_facts_for_astra.yaml"
      tags: always

    - name: Setup repo for Astra Linux
      ansible.builtin.include_role:
        name: setup_tmp_debian_repositories_for_astra
      vars:
        setup_debian_repositories_for_astra_action: 'INSTALL'
      when: ansible_facts_lsb_id is defined and ansible_facts_lsb_id == 'Astra'
      tags: always

  roles:
    - name: Open ftp port
      role: marcelnijenhof.firewalld
      vars:
        marcelnijenhof_firewalld_allow_services:
          - service: ftp
            immediate: true
      when: pureftp_action == 'create'
    - name: "Ftp user {{ pureftp_action }}"
      role: gcoop-libre.pure-ftpd
      vars:
        pureftpd_virtual_users:
          - name: "{{ ftp_user_name }}"
            password: "{{ ftp_user_password }}"
            homedir: "{{ ftp_user_dir }}"
            uid: "{{ ftp_user_uid }}"
            gid: "{{ ftp_user_uid }}"
        pureftpd_virtual_deleted_users:
          - name: "{{ ftp_user_name }}"

  post_tasks:
    - name: Setup repo for Astra Linux (cleanup)
      ansible.builtin.include_role:
        name: setup_tmp_debian_repositories_for_astra
      vars:
        setup_debian_repositories_for_astra_action: 'DELETE'
      when: ansible_facts_lsb_id is defined and ansible_facts_lsb_id == 'Astra'
      tags: always
