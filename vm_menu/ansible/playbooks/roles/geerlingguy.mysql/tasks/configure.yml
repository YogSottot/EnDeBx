---
- name: Ensure MySQL config include directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ ([mysql_config_include_dir] + ((ansible_os_family | lower == 'debian') | ternary(['/etc/mysql', '/etc/mysql/conf.d'], []))) | unique }}"

- name: Get MySQL version
  ansible.builtin.command: 'mysql --version'
  register: mysql_cli_version
  changed_when: false
  check_mode: false

- name: Extract MySQL version
  ansible.builtin.set_fact:
    mysql_version_detected: "{{ (mysql_cli_version.stdout | regex_search('\\s+([0-9]+\\.[0-9]+\\.[0-9]+)', '\\1') | first) | default('0.0.0') }}"

- name: Debug MySQL version
  ansible.builtin.debug:
    var: mysql_version_detected

- name: Normalize MySQL version and flavor
  ansible.builtin.set_fact:
    mysql_normalized:
      flavor: >-
        {% if 'MariaDB' in mysql_cli_version.stdout %}MariaDB
        {% elif 'Percona' in mysql_cli_version.stdout %}Percona
        {% else %}MySQL{% endif %}
      is_mariadb: "{{ 'MariaDB' in mysql_cli_version.stdout }}"
      is_percona: "{{ 'Percona' in mysql_cli_version.stdout }}"
      is_mysql: "{{ 'MariaDB' not in mysql_cli_version.stdout and 'Percona' not in mysql_cli_version.stdout }}"
      version: "{{ mysql_version_detected }}"  # Now a string, not a list

- name: Compute version_major
  ansible.builtin.set_fact:
    mysql_normalized: "{{ mysql_normalized | combine({
        'version': mysql_version_detected,
        'version_major': (mysql_version_detected.split('.')[:2] | join('.'))
      }) }}"

- name: Debug MySQL version and flavor
  ansible.builtin.debug:
    var: mysql_normalized

- name: Debug MySQL version and flavor
  ansible.builtin.debug:
    msg:
      flavor: "{{ mysql_normalized.flavor }}"
      version: "{{ mysql_normalized.version }}"
      is_mariadb: "{{ mysql_normalized.is_mariadb }}"
      is_percona: "{{ mysql_normalized.is_percona }}"
      version_major: "{{ mysql_normalized.version_major }}"

- name: Verify mysql include directory exists.
  ansible.builtin.file:
    path: "{{ mysql_config_include_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: mysql_config_include_files | length > 0

- name: Copy my.cnf global MySQL configuration.
  ansible.builtin.template:
    src: my.cnf.j2
    dest: "{{ mysql_config_include_dir }}/x_server.cnf"
    owner: root
    group: root
    mode: "0644"
    trim_blocks: true
    lstrip_blocks: true
  notify: restart mysql

- name: Copy my.cnf override files into include directory.
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ mysql_config_include_dir }}/{{ item.src | basename }}"
    owner: root
    group: root
    mode: "0644"
    force: "{{ item.force | default(False) }}"
  with_items: "{{ mysql_config_include_files }}"
  notify: restart mysql

- name: Add [mysqld] in z_bx_custom.cnf file
  ansible.builtin.lineinfile:
    path: "{{ mysql_config_include_dir }}/z_bx_custom.cnf"
    line: "[mysqld]"
    create: true
    state: present
    owner: root
    group: root
    mode: "0644"

- name: Verify mysql log directory exists.
  ansible.builtin.file:
    path: "{{ mysql_log_dir }}"
    state: directory
    owner: mysql
    group: "{{ mysql_log_file_group }}"
    mode: "2750"

- name: Create slow query log file (if configured).
  ansible.builtin.command: "touch {{ mysql_slow_query_log_file }}"
  args:
    creates: "{{ mysql_slow_query_log_file }}"
  when: mysql_slow_query_log_enabled

- name: Remove MariaDB datadir before bootstrap
  ansible.builtin.file:
    path: "{{ mysql_datadir }}"
    state: absent
  when:
    - mysql_flavor == 'mariadb'
    - mysql_install_packages | bool
    - ansible_os_family in ['Debian', 'Astra Linux']

- name: Create datadir if it does not exist
  ansible.builtin.file:
    path: "{{ mysql_datadir }}"
    state: directory
    owner: mysql
    group: mysql
    mode: "0755"
    setype: mysqld_db_t

- name: Bootstrap MariaDB system tables
  ansible.builtin.command:
    argv:
      - /usr/bin/mariadb-install-db
      - --rpm
      - --cross-bootstrap
      - --user=mysql
      - --disable-log-bin
      - --skip-test-db
      - --defaults-file=/etc/mysql/my.cnf
  environment:
    TMPDIR: /tmp
  changed_when: true
  when:
    - mysql_flavor == 'mariadb'
    - mysql_install_packages | bool
    - ansible_os_family in ['Debian', 'Astra Linux']

- name: Set ownership on slow query log file (if configured).
  ansible.builtin.file:
    path: "{{ mysql_slow_query_log_file }}"
    state: file
    owner: mysql
    group: "{{ mysql_log_file_group }}"
    mode: "0640"
  when: mysql_slow_query_log_enabled

- name: Create error log file (if configured).
  ansible.builtin.command: "touch {{ mysql_log_error }}"
  args:
    creates: "{{ mysql_log_error }}"
  when:
    - mysql_log is not none and mysql_log | length > 0
    - mysql_log_error is defined
  tags: ['skip_ansible_galaxy']

- name: Set ownership on error log file (if configured).
  ansible.builtin.file:
    path: "{{ mysql_log_error }}"
    state: file
    owner: mysql
    group: "{{ mysql_log_file_group }}"
    mode: "0640"
  when:
    - mysql_log is not none and mysql_log | length > 0
    - mysql_log_error is defined
  tags: ['skip_ansible_galaxy']

- name: Ensure MySQL is started and enabled on boot.
  ansible.builtin.service:
    name: "{{ mysql_daemon }}"
    state: started
    enabled: "{{ mysql_enabled_on_startup }}"
  register: mysql_service_configuration

- name: Wait for MySQL socket file
  ansible.builtin.wait_for:
    path: "{{ mysql_socket }}"
    timeout: 60
