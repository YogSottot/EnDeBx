---
- name: Check if MySQL is already installed.
  ansible.builtin.stat:
    path: "{{ mysql_config_file }}"
  register: mysql_installed

- name: Setup Percona repo on Astra Linux
  when:
    - ansible_facts_lsb_id is defined and ansible_facts_lsb_id == 'Astra' and mysql_flavor == 'percona'
    - not mysql_installed.stat.exists
  block:
    - name: Backup Astra /etc/os-release
      ansible.builtin.copy:
        src: /etc/os-release
        dest: /etc/os-release.astra
        remote_src: true
        mode: preserve

    - name: Write temporary Debian /etc/os-release
      ansible.builtin.copy:
        dest: /etc/os-release
        owner: root
        group: root
        mode: '0644'
        content: |
          PRETTY_NAME="Debian GNU/Linux 12 (bookworm)"
          NAME="Debian GNU/Linux"
          VERSION_ID="12"
          VERSION="12 (bookworm)"
          VERSION_CODENAME=bookworm
          ID=debian
          HOME_URL="https://www.debian.org/"
          SUPPORT_URL="https://www.debian.org/support"
          BUG_REPORT_URL="https://bugs.debian.org/"

    - name: Ensure MySQL repo is installed for Astra Linux
      ansible.builtin.apt:
        deb: "{{ mysql_percona_repo_baseurl }}/{{ mysql_percona_repo_release }}.{{ ansible_distribution_release }}_all.deb"
        state: present

    - name: Setup Percona release for Astra Linux
      ansible.builtin.command: percona-release setup ps{{ mysql_percona_version | regex_replace('[.~]', '') }}
      changed_when: false

  always:
    - name: Restore Astra /etc/os-release
      ansible.builtin.copy:
        src: /etc/os-release.astra
        dest: /etc/os-release
        remote_src: true
        mode: preserve

- name: Ensure MySQL repo is installed.
  ansible.builtin.apt:
    deb: "{{ mysql_percona_repo_baseurl }}/{{ mysql_percona_repo_release }}.{{ ansible_distribution_release }}_all.deb"
    state: present
  when:
    - (ansible_facts_lsb_id is not defined or ansible_facts_lsb_id != 'Astra') and mysql_flavor == 'percona'
    - not mysql_installed.stat.exists

- name: Setup Percona release
  ansible.builtin.command: percona-release setup ps{{ mysql_percona_version | regex_replace('[.~]', '') }}
  changed_when: false
  when:
    - (ansible_facts_lsb_id is not defined or ansible_facts_lsb_id != 'Astra') and mysql_flavor == 'percona'
    - not mysql_installed.stat.exists

- name: Update apt cache if MySQL is not yet installed.
  ansible.builtin.apt:
    update_cache: true
  changed_when: false
  when: not mysql_installed.stat.exists

- name: Ensure MySQL percona packages are installed.
  ansible.builtin.apt:
    name: "{{ mysql_percona_packages }}"
    state: present
    policy_rc_d: 101
  when: mysql_flavor == 'percona' and not mysql_installed.stat.exists
  environment:
    DEBIAN_FRONTEND: noninteractive
    TMPDIR: /tmp
    TMP: /tmp
    TEMP: /tmp
    # DEBIAN_PRIORITY: critical
  register: deb_percona_install_packages

- name: Ensure MySQL packages are installed.
  ansible.builtin.apt:
    name: "{{ mysql_packages }}"
    state: present
    policy_rc_d: 101
  environment:
    TMPDIR: /tmp
    TMP: /tmp
    TEMP: /tmp
  register: deb_mysql_install_packages

- name: Ensure MySQL Python libraries are installed.
  ansible.builtin.apt:
    name: "{{ mysql_python_package_debian }}"
    state: present

- name: Ensure MySQL mariadbb-5.5 packages are installed.
  ansible.builtin.include_tasks:
    file: mariadb-5.5.yml
  when: mysql_flavor =='mariadb' and mysql_mariadb_version == '5.5' and not mysql_installed.stat.exists

- name: Correct my.cnf version is selected
  community.general.alternatives:
    name: my.cnf
    path: "{{ mysql_config_file }}"

- name: Make sure that /etc/mysql/conf.d/ exist
  ansible.builtin.file:
    name: "/etc/mysql/conf.d/"
    state: directory
    mode: '0755'

# Because Ubuntu starts MySQL as part of the install process, we need to stop
# mysql and remove the logfiles in case the user set a custom log file size.
- name: Ensure MySQL is stopped after initial install.
  ansible.builtin.service:
    name: "{{ mysql_daemon }}"
    state: stopped
  when: not mysql_installed.stat.exists
