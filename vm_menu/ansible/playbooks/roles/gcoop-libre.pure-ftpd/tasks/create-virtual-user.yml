---
- name: "User {{ user.name }}: Create home directory"
  ansible.builtin.file:
    dest: "{{ user.homedir }}"
    owner: "{{ user.uid | default(pureftpd_virtual_users_user) }}"
    group: "{{ user.gid | default(pureftpd_virtual_users_group) }}"
    mode: '0755'
    state: directory

- name: "User {{ user.name }}: Verify if it exists"
  ansible.builtin.command: pure-pw show {{ user.name }}
  register: pureftpd_virtual_user_exists
  changed_when: "pureftpd_virtual_user_exists.rc != 0"
  ignore_errors: true

- name: "User {{ user.name }}: Create virtual user"
  ansible.builtin.shell: |
    set -o pipefail
    (echo {{ user.password }}; echo {{ user.password }}) | pure-pw useradd {{ user.name }} \
    -u {{ user.uid | default(pureftpd_virtual_users_user) }} \
    -g {{ user.gid | default(pureftpd_virtual_users_group) }} \
    -d {{ user.homedir }}
   # -n {{ user.quota_files | default('""') }} \
   # -N {{ user.quota_size | default('""') }} \
   # -t {{ user.bandwidth_dl | default('""') }} \
   # -T {{ user.bandwidth_ul | default('""') }} \
   # -q {{ user.ratio_ul | default('""') }} \
   # -Q {{ user.ratio_dl | default('""') }}
  args:
    executable: /bin/bash
  when: pureftpd_virtual_user_exists is failed
  notify: reload Pure-FTPd users
  changed_when: "pureftpd_virtual_user_exists.rc != 0"

- name: "User {{ user.name }}: Update virtual user"
  ansible.builtin.command: >-
    pure-pw usermod {{ user.name }}
    -u {{ user.uid | default(pureftpd_virtual_users_user) }}
    -g {{ user.gid | default(pureftpd_virtual_users_group) }}
    -d {{ user.homedir }}
  #  -n {{ user.quota_files | default('""') }}
  #  -N {{ user.quota_size | default('""') }}
  #  -t {{ user.bandwidth_dl | default('""') }}
  #  -T {{ user.bandwidth_ul | default('""') }}
  #  -q {{ user.ratio_ul | default('""') }}
  #  -Q {{ user.ratio_dl | default('""') }}
  when: pureftpd_virtual_user_exists is success
  notify: reload Pure-FTPd users
  changed_when: "pureftpd_virtual_user_exists.rc != 0"

- name: "User {{ user.name }}: Update virtual user password"
  ansible.builtin.shell: |
    set -o pipefail
    (echo {{ user.password }}; echo {{ user.password }}) | pure-pw passwd {{ user.name }}
  args:
    executable: /bin/bash
  when: pureftpd_virtual_user_exists is success
  notify: reload Pure-FTPd users
  changed_when: "pureftpd_virtual_user_exists.rc != 0"
