---
# tasks file for create_site
- name: Create directory of the site {{ domain }}
  ansible.builtin.file:
    state: directory
    path: "{{ path_sites }}/{{ domain }}"
    owner: "{{ user_server_sites }}"
    group: "{{ group_user_server_sites }}"
    mode: "{{ permissions_sites_dirs }}"

############## LINK MODE ##############
- name: "Mode: link"
  block:

    - name: Checking of path existence resources taken from settings
      ansible.builtin.stat:
        path: "{{ path_site_from_links }}/{{ item }}"
      register: link_source
      with_items: "{{ site_links_resources.split(',') }}"

    - name: Link creating
      ansible.builtin.file:
        src: "{{ path_site_from_links }}/{{ item.item }}"
        dest: "{{ path_sites }}/{{ domain }}/{{ item.item }}"
        state: link
      when: item.stat.exists
      with_items: "{{ link_source.results }}"

    - ansible.builtin.include_tasks: "tasks/change_owner_and_group_symbolic_links.yaml"
      vars:
        path_links: "{{ site_links_resources.split(',') }}"
        full_path: "{{ path_sites }}/{{ domain }}"

    - name: Adding index.php file for a site
      ansible.builtin.template:
        src: "site_link_tpl/index.j2"
        dest: "{{ path_sites }}/{{ domain }}/index.php"
        owner: "{{ user_server_sites }}"
        group: "{{ group_user_server_sites }}"
        mode: "{{ permissions_sites_files }}"

    - name: Extract database name from .settings.php
      shell: |
        php -r '
        $settings = include "{{ path_site_from_links }}/bitrix/.settings.php";
        echo $settings["connections"]["value"]["default"]["database"];
        '
      register: db_name_result
      changed_when: false

    - name: Set db_name variable
      set_fact:
        db_name: "{{ db_name_result.stdout }}"

  when: mode == 'link'

############## FULL MODE ##############
- name: "Mode: full"
  block:

    - name: Validate Bitrix setup download mode
      ansible.builtin.assert:
        that:
          - download_bitrixsetup in ['Y', 'N']
        fail_msg: "download_bitrixsetup must be Y or N"

    - name: Download Bitrix setup scripts for new full site
      when: download_bitrixsetup == 'Y'
      block:
        - name: Creating array of urls
          ansible.builtin.set_fact:
            urls: "{{ download_bitrix_install_files_new_site.split(',') }}"
          no_log: true

        - name: Downloading Bitrix scripts
          ansible.builtin.get_url:
            url: "{{ item }}"
            dest: "{{ path_sites }}/{{ domain }}"
            owner: "{{ user_server_sites }}"
            group: "{{ group_user_server_sites }}"
            mode: "{{ permissions_sites_files }}"
            timeout: "{{ timeout_download_bitrix_install_files_new_site }}"
          with_items: "{{ urls }}"

        - name: Creating of downloaded file names array
          ansible.builtin.set_fact:
            file_names_download: "{{ urls | map('basename') | list }}"
          no_log: true

        - name: Generating index.html using links of downloaded files
          ansible.builtin.template:
            dest: "{{ path_sites }}/{{ domain }}/index.php"
            src: "site_full_tpl/index.j2"
            owner: "{{ user_server_sites }}"
            group: "{{ group_user_server_sites }}"
            mode: "{{ permissions_sites_files }}"
          no_log: true

    - name: Generating default index.php without Bitrix setup scripts
      ansible.builtin.template:
        dest: "{{ path_sites }}/{{ domain }}/index.php"
        src: "site_full_tpl/index.php.j2"
        owner: "{{ user_server_sites }}"
        group: "{{ group_user_server_sites }}"
        mode: "{{ permissions_sites_files }}"
      when: download_bitrixsetup == 'N'

    - name: Installing of python3-pymysql
      ansible.builtin.apt:
        name: python3-pymysql
        state: present
      when: db_type | default('mysql') == 'mysql'

    - name: Creating database
      community.mysql.mysql_db:
        name: "{{ db_name }}"
        state: present
      when: db_type | default('mysql') == 'mysql'

    - name: Check if caching_sha2_password plugin exists
      community.mysql.mysql_query:
        query: |
          SELECT COUNT(*) AS cnt
          FROM INFORMATION_SCHEMA.PLUGINS
          WHERE PLUGIN_NAME = 'caching_sha2_password';
      register: mysql_plugin_check
      when: db_type | default('mysql') == 'mysql'

    - name: Set fact if caching_sha2_password exists
      ansible.builtin.set_fact:
        has_caching_sha2: "{{ mysql_plugin_check.query_result[0][0].cnt | int > 0 }}"
      when: db_type | default('mysql') == 'mysql'

    - name: Get MySQL charset and collation
      community.mysql.mysql_query:
        query: |
          SELECT
            @@character_set_server AS mysql_character_set_server,
            @@collation_server AS mysql_collation_server;
      register: mysql_vars
      when: db_type | default('mysql') == 'mysql'

    - name: Set MySQL charset and collation facts
      ansible.builtin.set_fact:
        mysql_character_set_server: "{{ mysql_vars.query_result[0][0].mysql_character_set_server }}"
        mysql_collation_server: "{{ mysql_vars.query_result[0][0].mysql_collation_server }}"
      when: db_type | default('mysql') == 'mysql'

    - name: Ensure MySQL users are present.
      community.mysql.mysql_user:
        name: "{{ db_user }}"
        host: "localhost"
        password: "{{ db_password }}"
        priv: "{{ db_name }}.*:ALL"
        column_case_sensitive: true
      when: db_type | default('mysql') == 'mysql' and not has_caching_sha2

    - name: Ensure MySQL users are present with caching_sha2_password plugin
      community.mysql.mysql_user:
        name: "{{ db_user }}"
        host: "localhost"
        plugin: caching_sha2_password
        plugin_auth_string: "{{ db_password }}"
        priv: "{{ db_name }}.*:ALL"
        column_case_sensitive: true
      when: db_type | default('mysql') == 'mysql' and has_caching_sha2

    - name: Installing of python3-psycopg2
      ansible.builtin.apt:
        name: python3-psycopg2
        state: present
      when: db_type | default('mysql') == 'pgsql'

    - name: Ensure PostgreSQL user is present
      community.postgresql.postgresql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        port: "{{ postgresql_port }}"
        login_user: postgres
        login_unix_socket: /run/postgresql
        encrypted: true
        state: present
      become: true
      become_user: postgres
      become_method: su
      when: db_type | default('mysql') == 'pgsql'

    - name: Ensure PostgreSQL database is present
      community.postgresql.postgresql_db:
        name: "{{ db_name }}"
        port: "{{ postgresql_port }}"
        lc_collate: "{{ postgresql_db_lc_collate | default('ru_RU.UTF-8') }}"
        lc_ctype: "{{ postgresql_db_lc_ctype | default(postgresql_db_lc_collate | default('ru_RU.UTF-8')) }}"
        encoding: "{{ postgresql_db_encoding | default('UTF-8') }}"
        template: template0
        login_user: postgres
        login_unix_socket: /run/postgresql
        owner: "{{ db_user }}"
        state: present
      become: true
      become_user: postgres
      become_method: su
      when: db_type | default('mysql') == 'pgsql'

    - name: Ensure pgcrypto extension is present
      community.postgresql.postgresql_ext:
        name: pgcrypto
        db: "{{ db_name }}"
        port: "{{ postgresql_port }}"
        login_user: postgres
        login_unix_socket: /run/postgresql
        state: present
      become: true
      become_user: postgres
      become_method: su
      when: db_type | default('mysql') == 'pgsql'

    - name: Grant PostgreSQL privileges on public schema
      community.postgresql.postgresql_privs:
        roles: "{{ db_user }}"
        database: "{{ db_name }}"
        privs: ALL
        objs: public
        type: schema
        state: present
        port: "{{ postgresql_port }}"
        login_user: postgres
        login_unix_socket: /run/postgresql
      become: true
      become_user: postgres
      become_method: su
      when: db_type | default('mysql') == 'pgsql'

    - name: Grant PostgreSQL privileges on database
      community.postgresql.postgresql_privs:
        roles: "{{ db_user }}"
        database: "{{ db_name }}"
        privs: ALL
        objs: "{{ db_name }}"
        type: database
        state: present
        port: "{{ postgresql_port }}"
        login_user: postgres
        login_unix_socket: /run/postgresql
      become: true
      become_user: postgres
      become_method: su
      when: db_type | default('mysql') == 'pgsql'

    - name: Add PostgreSQL user to pgbouncer
      ansible.builtin.include_role:
        name: mshurutov.pgbouncer
      vars:
        pgbouncer_action: INSTALL
        pgbouncer_state: present
        pgbouncer_pkg_state: present
        pgbouncer_db_state: present
        pgbouncer_db_user: "{{ db_user }}"
        pgbouncer_db_password: "{{ db_password }}"
        pgbouncer_db_port: "{{ postgresql_port }}"
        pgbouncer_db_host: "/run/postgresql/"
        postgresql_db_encoding: "{{ postgresql_db_encoding | default('UTF-8') }}"
      when:
        - db_type | default('mysql') == 'pgsql'
        - pgbouncer_use | default(false) | bool

    - name: Creating directory bitrix/php_interface
      ansible.builtin.file:
        state: directory
        path: "{{ path_sites }}/{{ domain }}/bitrix/php_interface"
        owner: "{{ user_server_sites }}"
        group: "{{ group_user_server_sites }}"
        mode: "{{ permissions_sites_dirs }}"

    - name: Generating dbconn.php file
      ansible.builtin.template:
        dest: "{{ path_sites }}/{{ domain }}/bitrix/php_interface/dbconn.php"
        src: "site_full_tpl/dbconn.j2"
        owner: "{{ user_server_sites }}"
        group: "{{ group_user_server_sites }}"
        mode: "{{ permissions_sites_files }}"

    - name: Generate crypto key
      ansible.builtin.set_fact:
        crypto_key: "{{ lookup('password', '/dev/null chars=ascii_lowercase,digits length=32') }}"

    - name: Check if push-server config file exists
      ansible.builtin.stat:
        path: "{{ push_server_config }}"
      register: push_server_config_stat

    - name: Set effective push-server settings flag
      ansible.builtin.set_fact:
        push_server_bx_settings_effective: "{{ 'Y' if push_server_bx_settings == 'Y' and push_server_config_stat.stat.exists else 'N' }}"

    - name: Read push-server config file
      ansible.builtin.slurp:
        src: "{{ push_server_config }}"
      register: push_config_content
      when: push_server_bx_settings_effective == 'Y'

    - name: Extract SECURITY_KEY and set push_key variable
      ansible.builtin.set_fact:
        push_key: "{{ push_config_content['content'] | b64decode | regex_search('SECURITY_KEY=\"([^\"]+)\"', '\\1') | first }}"
      when: push_server_bx_settings_effective == 'Y'

    - name: Generating .settings.php file
      ansible.builtin.template:
        dest: "{{ path_sites }}/{{ domain }}/bitrix/.settings.php"
        src: "site_full_tpl/.settings.j2"
        owner: "{{ user_server_sites }}"
        group: "{{ group_user_server_sites }}"
        mode: "{{ permissions_sites_files }}"

    - name: Generating after_connect_d7.php file
      ansible.builtin.template:
        dest: "{{ document_root }}/bitrix/php_interface/after_connect_d7.php"
        src: "roles/create_site/templates/site_full_tpl/after_connect_d7.php.j2"
        owner: "{{ user_server_sites }}"
        group: "{{ group_user_server_sites }}"
        mode: "{{ permissions_sites_files }}"
      when: db_type | default('mysql') == 'mysql'

    - name: Remove after_connect_d7.php for PostgreSQL
      ansible.builtin.file:
        path: "{{ document_root }}/bitrix/php_interface/after_connect_d7.php"
        state: absent
      when: db_type | default('mysql') == 'pgsql'

    - name: Creating directory from bitrix temporary files
      ansible.builtin.file:
        state: directory
        path: "{{ bx_temporary_files_directory }}"
        owner: "{{ user_server_sites }}"
        group: "{{ group_user_server_sites }}"
        mode: "{{ permissions_sites_dirs }}"
        recurse: true
      vars:
        bx_temporary_files_directory: "{{ path_sites }}/.bx_temp/{{ db_name }}/"

    - ansible.builtin.include_tasks: "tasks/add_cron_agents.yaml"
      vars:
        path_file_run_cron: "{{ path_sites }}/{{ domain }}{{ bx_cron_agents_path_file_after_document_root }}"
        user_site: "{{ user_server_sites }}"
        group_user_site: "{{ group_user_server_sites }}"
        logs_path_dir: "{{ bx_cron_logs_path_dir }}"
        logs_path_file: "{{ bx_cron_logs_path_file }}"

  when: mode == 'full'

############## SITE FILES ##############
- name: Adding .htaccess file
  ansible.builtin.copy:
    src: "site_files/.htaccess"
    dest: "{{ path_sites }}/{{ domain }}"
    owner: "{{ user_server_sites }}"
    group: "{{ group_user_server_sites }}"
    mode: "{{ permissions_sites_files }}"

############## NGINX ##############
- name: Get Nginx version
  ansible.builtin.command: nginx -v
  register: nginx_version_output
  changed_when: false

- name: Extract Nginx version number
  ansible.builtin.set_fact:
    nginx_version: "{{ nginx_version_output.stderr | regex_search('\\d+\\.\\d+\\.\\d+') }}"

- name: Adding Nginx site_settings directory
  ansible.builtin.file:
    path: "{{ path_nginx }}/site_settings/{{ domain }}"
    state: directory
    owner: root
    group: root
    mode: '755'

- name: Adding Nginx site_settings file
  ansible.builtin.template:
    dest: "{{ path_nginx }}/site_settings/{{ domain }}/bx_temp.conf"
    src: "nginx_conf/bx_temp.j2"
    owner: root
    group: root
    mode: '644'

- name: Copying default configs to site_settings
  ansible.builtin.copy:
    src: "nginx_files/custom_conf.d/site_settings/default/"
    dest: "{{ path_nginx }}/site_settings/{{ domain }}/"
    owner: root
    group: root
    mode: '644'

- name: Copying ssl_default.conf to ssl_{{ domain }}.conf
  ansible.builtin.copy:
    src: "nginx_files/ssl_conf/ssl_default.conf"
    dest: "/etc/{{ service_nginx_name }}/ssl_conf/ssl_{{ domain }}.conf"
    owner: root
    group: root
    mode: '644'

- name: Adding Nginx configuration file
  ansible.builtin.template:
    dest: "{{ path_nginx_sites_conf }}/{{ domain }}.conf"
    src: "nginx_conf/site.j2"
    owner: root
    group: root
    mode: '644'

- name: Creating symbol link (site_enable) for Nginx configuration file
  ansible.builtin.file:
    src: "{{ path_nginx_sites_conf }}/{{ domain }}.conf"
    dest: "{{ path_nginx_sites_enabled }}/{{ domain }}.conf"
    state: link

- name: Adding Nginx site_settings directory
  ansible.builtin.file:
    path: "{{ path_nginx }}/site_settings/{{ domain }}"
    state: directory
    owner: root
    group: root
    mode: '755'

- name: Adding Nginx site_settings file
  ansible.builtin.template:
    dest: "{{ path_nginx }}/site_settings/{{ domain }}/bx_temp.conf"
    src: "roles/create_site/templates/nginx_conf/bx_temp.j2"
    owner: root
    group: root
    mode: '644'

- name: Reloading Nginx
  ansible.builtin.systemd:
    name: "{{ service_nginx_name }}"
    state: reloaded
    enabled: true


############## APACHE ##############
- name: Adding Apache configuration file
  ansible.builtin.template:
    dest: "{{ path_apache_sites_conf }}/{{ domain }}.conf"
    src: "apache_conf/site.j2"
    owner: root
    group: root
    mode: '644'

- name: Creating symbol link (site_enable) for Apache configuration file
  ansible.builtin.file:
    src: "{{ path_apache_sites_conf }}/{{ domain }}.conf"
    dest: "{{ path_apache_sites_enabled }}/{{ domain }}.conf"
    state: link

- name: Reloading Apache
  ansible.builtin.systemd:
    name: "{{ service_apache_name }}"
    state: reloaded
    enabled: true
  when: htaccess_support | bool

############## Logrotate ##############

- name: Creating logs directory
  ansible.builtin.file:
    state: directory
    path: "{{ document_root }}/logs"
    owner: "{{ user_server_sites }}"
    group: "{{ group_user_server_sites }}"
    mode: "{{ permissions_sites_dirs }}"
    recurse: true

- name: Adding logrotate file
  ansible.builtin.template:
    src: "roles/create_site/templates/logrotate/logrotate.j2"
    dest: "/etc/logrotate.d/bx_{{ domain }}"
    owner: "root"
    group: "root"
    mode: "644"
