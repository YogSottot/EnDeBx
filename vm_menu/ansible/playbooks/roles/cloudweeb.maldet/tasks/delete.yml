---

- name: Remove maldet binary
  ansible.builtin.file:
    path: /usr/local/sbin/maldet
    state: absent

- name: Remove maldet directory
  ansible.builtin.file:
    path: /usr/local/maldetect/
    state: absent

- name: Stop and disable maldet service
  ansible.builtin.service:
    name: maldet
    state: stopped
    enabled: false

- name: Remove YARA-X CLI
  ansible.builtin.import_tasks: delete_yara_x.yml
