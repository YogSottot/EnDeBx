---
- name: Update apt and install curl gnupg apt-transport-https
  ansible.builtin.package:
    update_cache: true
    name:
      - curl
      - gnupg
      - apt-transport-https
      - debian-archive-keyring
      - nftables
    state: present

- name: Start nftables services
  ansible.builtin.service:
    name: nftables
    state: started
    enabled: true
  when: default_os_firewall == 'nftables'

- name: Crowdsec Add GPG apt Key
  ansible.builtin.get_url:
    url: https://packagecloud.io/crowdsec/crowdsec/gpgkey
    dest: /etc/apt/keyrings/crowdsec.asc
    mode: '0644'
    owner: root
    group: root

- name: Crowdsec Add Repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/crowdsec.asc] https://packagecloud.io/crowdsec/crowdsec/{{ ansible_distribution | lower }} {{ ansible_distribution_release | lower }} main"
    state: present
