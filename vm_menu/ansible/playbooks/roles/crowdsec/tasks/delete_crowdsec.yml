---
- name: Delete CrowdSec AppSec files
  ansible.builtin.include_tasks: delete_appsec.yml

- name: Delete crowdsec
  ansible.builtin.package:
    name:
      - crowdsec
      - crowdsec-firewall-bouncer-nftables
      - crowdsec-firewall-bouncer-iptables
    state: absent

- name: Delete repo
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/packagecloud_io_crowdsec_crowdsec_any.list
    state: absent
  when: ansible_os_family | lower == "debian"

- name: Delete CrowdSec apt keyring
  ansible.builtin.file:
    path: /etc/apt/keyrings/crowdsec.asc
    state: absent
  when: ansible_os_family | lower == "debian"
