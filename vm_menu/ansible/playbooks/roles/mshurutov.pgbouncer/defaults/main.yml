---
# defaults file for pgbouncer
pgbouncer_pkg_state: "{{ pgbouncer_state }}"
pgbouncer_files_dir: "{{ role_path }}/files"
pgbouncer_templates_dir: "{{ role_path }}/templates"
pgbouncer_vars_dir: "{{ role_path }}/vars"
pgbouncer_config_dir: "/etc/pgbouncer"
pgbouncer_config_file: "{{ pgbouncer_config_dir }}/pgbouncer-other.ini"
pgbouncer_user_file: "{{ pgbouncer_config_dir }}/userlist.txt"
# pgbouncer_auth_hba_file: "{{ pgbouncer_config_dir }}/pg_hba.conf"
pgbouncer_listen_port: "6432"
pgbouncer_system_user: "postgres"
pgbouncer_system_group: "{{ pgbouncer_system_user }}"
pgbouncer_config_params_default:
  - name: "databases"
    comment: |
      ; Database settings
    params:
      - name: "*"
        value: "host=/run/postgesql/ port=5432 client_encoding=UTF8"
  - name: "pgbouncer"
    comment: |
      ; Global pgbouncer settings
    params:
      - name: "pool_mode"
        value: "transaction"
      - name: "auth_file"
        value: "{{ pgbouncer_user_file }}"
      - name: "max_client_conn"
        value: "10000"
      - name: "default_pool_size"
        value: "50"
      - name: "listen_port"
        value: "{{ pgbouncer_listen_port }}"
      - name: "listen_addr"
        value: "localhost"
      - name: unix_socket_dir
        value: "/run/postgresql"
      - name: "logfile"
        value: "/var/log/postgresql/pgbouncer.log"
      - name: "pidfile"
        value: "/run/postgresql/pgbouncer.pid"
      - name: "admin_users"
        value: "{{ pgbouncer_system_user }}"
      - name: "stats_users"
        value: "{{ pgbouncer_system_user }}"
