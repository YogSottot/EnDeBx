---
# handlers file for pgbouncer
- name: Pgbouncer restart
  become: true
  become_user: root
  become_method: su
  ansible.builtin.service:
    name: pgbouncer
    state: restarted

- name: Pgbouncer reload
  become: true
  become_user: root
  become_method: su
  ansible.builtin.service:
    name: pgbouncer
    state: reloaded
